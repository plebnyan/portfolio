<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<style>
  @keyframes pulseTop {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes pulseData {
    0%, 100% { opacity: 0; }
    20%, 80% { opacity: 1; }
  }
  .top-cyl { animation: pulseTop 1.8s ease-in-out infinite; }
  .data-line-1 { animation: pulseData 1.8s ease-in-out infinite; }
  .data-line-2 { animation: pulseData 1.8s ease-in-out 0.3s infinite; }
  .data-line-3 { animation: pulseData 1.8s ease-in-out 0.6s infinite; }
</style>

<!-- bottom cylinder -->
<rect x="15" y="62" width="70" height="22" fill="#16a34a"/>
<ellipse cx="50" cy="84" rx="35" ry="10" fill="#15803d"/>
<ellipse cx="50" cy="62" rx="35" ry="10" fill="#22c55e"/>

<!-- middle cylinder -->
<rect x="15" y="38" width="70" height="24" fill="#22c55e"/>
<ellipse cx="50" cy="62" rx="35" ry="10" fill="#16a34a"/>
<ellipse cx="50" cy="38" rx="35" ry="10" fill="#4ade80"/>

<!-- data lines -->
<line x1="25" y1="47" x2="55" y2="47" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.35" class="data-line-1"/>
<line x1="25" y1="54" x2="62" y2="54" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.35" class="data-line-2"/>
<line x1="25" y1="61" x2="48" y2="61" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.35" class="data-line-3"/>

<!-- top cylinder (pulsing) -->
<g class="top-cyl">
  <rect x="15" y="14" width="70" height="24" fill="#4ade80"/>
  <ellipse cx="50" cy="38" rx="35" ry="10" fill="#22c55e"/>
  <ellipse cx="50" cy="14" rx="35" ry="10" fill="#86efac"/>
</g>
</svg>
